<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPTI 监控室 | 主理人专供</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: "Courier New", Courier, monospace;
            margin: 0;
            padding: 40px;
        }

        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 4px;
            font-weight: normal;
            color: #fff;
        }

        .total-count {
            font-size: 36px;
            color: #00fff9;
            margin: 10px 0 0 0;
        }

        .label {
            font-size: 12px;
            color: #666;
            letter-spacing: 2px;
        }

        .chart-wrapper {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .refresh-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }

        .refresh-btn:hover {
            background: #00fff9;
            color: #000;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="header">
            <div>
                <h1>[ PPTI 临床确诊监控室 ]</h1>
                <p class="label">Total Diagnostics / 全网确诊总数</p>
                <p class="total-count" id="total-text">0</p>
            </div>
            <button class="refresh-btn" onclick="fetchStats()">刷新数据 Sync Data</button>
        </div>

        <div class="chart-wrapper">
            <canvas id="statsChart" height="150"></canvas>
        </div>
    </div>

    <script>
        // 👇 记得替换成你自己的 Worker URL 
        const WORKER_URL = "https://comment.nirajkaniska958.workers.dev/comments?action=stats";

        // 用于把死板的代号翻译成帅气的名字
        const nameMap = {
            "INTJ": "纯摆子", "ISFJ": "纯种牛马", "INFP": "老丧瓜", "ENTP": "纯杠精",
            "ESTJ": "卷王", "ENTJ": "画饼粉碎机", "INFJ": "街溜子", "ISTJ": "强迫症",
            "ISTP": "哑巴", "INTP": "重度社恐", "ENFJ": "端水大师", "ISFP": "床垫寄生虫",
            "ENFP": "快乐吗喽", "ESFP": "散财活爹", "ESFJ": "伦理人质", "ESTP": "野生大喷子",
            "LORD": "主宰 (隐)", "BLACKHOLE": "黑洞 (隐)", "XIAOQIANG": "蟑螂 (隐)", "CHAOS": "狂徒 (隐)"
        };

        let myChart = null;

        async function fetchStats() {
            const btn = document.querySelector('.refresh-btn');
            btn.innerText = "同步中...";
            try {
                const res = await fetch(WORKER_URL);
                const data = await res.json();
                renderChart(data);
            } catch (err) {
                alert("无法连接到监控核心：" + err);
            }
            btn.innerText = "刷新数据 Sync Data";
        }

        function renderChart(data) {
            const ctx = document.getElementById('statsChart').getContext('2d');

            // 排序：从最多的人格排到最少
            const sortedData = Object.entries(data).sort((a, b) => b[1] - a[1]);

            const labels = sortedData.map(item => `${nameMap[item[0]] || item[0]} (${item[0]})`);
            const counts = sortedData.map(item => item[1]);

            const total = counts.reduce((a, b) => a + b, 0);
            document.getElementById('total-text').innerText = total.toLocaleString();

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '确诊人数',
                        data: counts,
                        backgroundColor: 'rgba(255, 255, 255, 0.8)',
                        borderColor: '#fff',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    indexAxis: 'y', // 横向柱状图，名字长也能看清
                    scales: {
                        x: { grid: { color: '#333' }, ticks: { color: '#888' } },
                        y: { grid: { display: false }, ticks: { color: '#ccc', font: { size: 12 } } }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // 页面加载自动获取一次
        fetchStats();
    </script>
</body>

</html>
